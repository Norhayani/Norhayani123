    <style>
        /* CSS INTERNAL */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #800000;
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }

        nav {
            background-color: #4a0000;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            padding: 1rem 1.5rem;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.9rem;
        }

        nav a:hover {
            background-color: #a52a2a;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #800000;
            object-fit: cover;
            margin-bottom: 10px;
        }

        h2 {
            color: #800000;
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #800000;
            padding-bottom: 5px;
        }

        /* Tabel Biodata */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        table td:first-child {
            font-weight: bold;
            color: #800000;
            width: 30%;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #800000;
            color: white;
            margin-top: 3rem;
        }

        @media (max-width: 600px) {
            nav { flex-direction: column; text-align: center; }
            .container { margin: 1rem; padding: 1rem; }
        }
    </style>
</head>
