<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri - Tema Maroon</title>
    <style>
        /* CSS INTERNAL */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background-color: #800000;
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }

        nav {
            background-color: #4a0000;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            padding: 1rem 1.5rem;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.9rem;
        }

        nav a:hover {
            background-color: #a52a2a;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #800000;
            text-align: center;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Grid Galeri */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            border: 4px solid #800000;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(128, 0, 0, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .caption {
            background-color: #800000;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #800000;
            color: white;
            margin-top: 3rem;
        }

        @media (max-width: 600px) {
            nav { flex-direction: column; text-align: center; }
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>GALERI SAYA</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri.html">Galeri</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="container">
        <h2>Koleksi Foto</h2>
        
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="foto depan.jpg" alt="Foto 1">
                <div class="caption">Bagian Depan</div>
            </div>

            <div class="gallery-item">
                <img src="foto belakang.jpg" alt="Foto 2">
                <div class="caption">Bagian Belakang</div>
            </div>

            <div class="gallery-item">
                <img src="samping kanan.jpg" alt="Foto 3">
                <div class="caption">Bagian Kanan</div>
            </div>

            <div class="gallery-item">
                <img src="https://via.placeholder.com/400x300/800000/FFFFFF?text=Foto+4" alt="Foto 4">
                <div class="caption">Bagian Kiri</div>
                
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 20
