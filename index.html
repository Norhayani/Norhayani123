<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulir Pengumpulan Data</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; padding: 20px; }
    .form-container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
    .section-title { border-bottom: 2px solid #0d6efd; padding-bottom: 10px; margin-top: 30px; margin-bottom: 20px; color: #0d6efd;}
  </style>
</head>
<body>

<div class="form-container">
  <h2 class="text-center mb-4">Formulir Data Pengguna & Transaksi</h2>
  
  <form id="dataForm" onsubmit="kirimData(event)">
    
    <h4 class="section-title">Data Demografi</h4>
    <div class="mb-3">
      <label class="form-label">Nama Pengguna</label>
      <input type="text" class="form-control" name="nama" required>
    </div>
    
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Tanggal Lahir</label>
        <input type="date" class="form-control" name="tglLahir" required>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Pendidikan</label>
        <input class="form-control" list="listPendidikan" name="pendidikan" placeholder="Pilih atau ketik..." required>
        <datalist id="listPendidikan">
          <option value="SD">
          <option value="SMP">
          <option value="SMA/SMK">
          <option value="Diploma (D1-D4)">
          <option value="Sarjana (S1)">
          <option value="Magister (S2)">
          <option value="Doktor (S3)">
        </datalist>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Alamat</label>
      <textarea class="form-control" name="alamat" rows="3" required></textarea>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">No Telepon</label>
        <input type="tel" class="form-control" name="noTelp" required>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" required>
      </div>
    </div>

    <h4 class="section-title">Data Bank</h4>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Nama Bank</label>
        <input class="form-control" list="listBank" name="bank" placeholder="Cari atau pilih bank..." required>
        <datalist id="listBank">
          <option value="BCA">
          <option value="Mandiri">
          <option value="BNI">
          <option value="BRI">
          <option value="BSI">
          <option value="CIMB Niaga">
        </datalist>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Nomor Rekening</label>
        <input type="number" class="form-control" name="rekening" required>
      </div>
    </div>

    <h4 class="section-title">Data Transaksi Keuangan</h4>
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Tanggal Transaksi</label>
        <input type="date" class="form-control" name="tglTransaksi" required>
      </div>
      <div class="col-md-8 mb-3">
        <label class="form-label">Uraian Transaksi</label>
        <input type="text" class="form-control" name="uraian" required>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label d-block">Jenis Transaksi</label>
      <div class="btn-group w-100" role="group">
        <input type="radio" class="btn-check" name="jenisTransaksi" id="btnDebet" value="Debet" required>
        <label class="btn btn-outline-danger" for="btnDebet">Debet (Uang Keluar)</label>

        <input type="radio" class="btn-check" name="jenisTransaksi" id="btnKredit" value="Kredit">
        <label class="btn btn-outline-success" for="btnKredit">Kredit (Uang Masuk)</label>
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100 py-2 fs-5" id="btnSubmit">Kirim Data</button>
    
    <div id="statusPesan" class="mt-3 text-center fw-bold"></div>
  </form>
</div>

<script>
  function kirimData(event) {
    event.preventDefault(); // Mencegah reload halaman
    
    const tombol = document.getElementById('btnSubmit');
    const status = document.getElementById('statusPesan');
    const form = document.getElementById('dataForm');
    
    tombol.disabled = true;
    tombol.innerText = "Mengirim...";
    status.innerText = "";
    status.className = "mt-3 text-center fw-bold text-primary";

    // Memanggil fungsi di Code.gs
    google.script.run
      .withSuccessHandler(function(response) {
        status.innerText = response;
        status.className = "mt-3 text-center fw-bold text-success";
        form.reset(); // Kosongkan form setelah sukses
        tombol.disabled = false;
        tombol.innerText = "Kirim Data";
      })
      .withFailureHandler(function(error) {
        status.innerText = "Gagal: " + error.message;
        status.className = "mt-3 text-center fw-bold text-danger";
        tombol.disabled = false;
        tombol.innerText = "Coba Lagi";
      })
      .prosesDataFormulir(form);https://script.google.com/macros/s/AKfycbyTQ22VbxzTNwe1k9i1sH9vGcha1GiWrgUqJL0yYoX7es6ShT7SMS_nojRkrgw8yTHLig/exec
  }
</script>

</body>
</html>
