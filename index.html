<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { padding: 20px; background-color: #f8f9fa; }
    .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h4 { border-bottom: 2px solid #0d6efd; padding-bottom: 10px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container form-container">
    <h2 class="mb-4">Formulir Pengumpulan Data</h2>
    <form id="myForm" onsubmit="handleFormSubmit(this)">
      
      <h4>Data Demografi</h4>
      <div class="mb-3">
        <label>Nama Lengkap</label>
        <input type="text" name="nama" class="form-control" required>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label>Tanggal Lahir</label>
          <input type="date" name="tgl_lahir" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
          <label>Pendidikan</label>
          <select name="pendidikan" class="form-select">
            <option value="SMA">SMA/Sederajat</option>
            <option value="D3">Diploma (D3)</option>
            <option value="S1">Sarjana (S1)</option>
            <option value="S2">Pascasarjana (S2)</option>
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label>Alamat</label>
        <textarea name="alamat" class="form-control"></textarea>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label>No. Telepon</label>
          <input type="tel" name="telp" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
          <label>Email</label>
          <input type="email" name="email" class="form-control">
        </div>
      </div>

      <h4>Data Perbankan</h4>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label>Nama Bank</label>
          <input class="form-control" list="bankList" name="bank" placeholder="Cari atau pilih bank...">
          <datalist id="bankList">
            <option value="BCA"><option value="Mandiri"><option value="BNI"><option value="BRI">
          </datalist>
        </div>
        <div class="col-md-6 mb-3">
          <label>Nomor Rekening</label>
          <input type="number" name="rekening" class="form-control">
        </div>
      </div>

      <h4>Data Transaksi</h4>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label>Tanggal Transaksi</label>
          <input type="date" name="tgl_transaksi" class="form-control">
        </div>
        <div class="col-md-8 mb-3">
          <label>Uraian</label>
          <input type="text" name="uraian" class="form-control">
        </div>
      </div>
      <div class="mb-3">
        <label class="d-block">Jenis Transaksi</label>
        <div class="btn-group w-100" role="group">
          <input type="radio" class="btn-check" name="jenis_transaksi" id="debet" value="Debet" checked>
          <label class="btn btn-outline-primary" for="debet">Debet</label>
          <input type="radio" class="btn-check" name="jenis_transaksi" id="kredit" value="Kredit">
          <label class="btn btn-outline-danger" for="kredit">Kredit</label>
        </div>
      </div>
      <div class="mb-3">
        <label>Nominal (Rp)</label>
        <input type="number" name="nominal" class="form-control">
      </div>

      <button type="submit" class="btn btn-success w-100 mt-4">Kirim Data</button>
    </form>
    <div id="output" class="mt-3 text-center fw-bold"></div>
  </div>

  <script>
    function handleFormSubmit(formObject) {
      document.getElementById('output').innerHTML = "Sedang mengirim...";
      google.script.run.withSuccessHandler(function(msg) {
        document.getElementById('output').innerHTML = msg;
        document.getElementById("myForm").reset();
      }).processForm(formObject);
    }
  </script>
</body>
</html>https://script.google.com/macros/s/AKfycbwPuNdnYpDuYaVZG8uco5FHW4MGrDDsghyvDSwHTFJYE0jzi5XMNIMI3vOLNHEJsmKvjQ/exec
