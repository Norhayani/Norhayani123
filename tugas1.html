<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendataan Terintegrasi Google Sheets</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        fieldset { border: 1px solid #ddd; border-radius: 5px; padding: 15px; margin-bottom: 20px; }
        legend { font-weight: bold; color: #0056b3; padding: 0 5px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="date"], input[type="email"], input[type="tel"], input[type="number"], textarea, input[list] {
            width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        /* Styling untuk Radio Buttons (Tombol Pilihan) */
        .radio-group { display: flex; gap: 15px; margin-bottom: 15px; }
        .radio-group label { font-weight: normal; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        button[type="submit"] {
            width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold;
        }
        button[type="submit"]:hover { background-color: #218838; }
        #pesan { text-align: center; margin-top: 15px; font-weight: bold; color: green; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Formulir Pengumpulan Data</h2>
    <form id="form-data" name="google-sheet">
        
        <fieldset>
            <legend>Data Demografi</legend>
            <label for="nama">Nama Pengguna:</label>
            <input type="text" id="nama" name="nama" required>

            <label for="tgl_lahir">Tanggal Lahir:</label>
            <input type="date" id="tgl_lahir" name="tgl_lahir" required>

            <label for="alamat">Alamat Lengkap:</label>
            <textarea id="alamat" name="alamat" rows="3" required></textarea>

            <label for="telepon">No Telepon:</label>
            <input type="tel" id="telepon" name="telepon" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="pendidikan">Pendidikan Terakhir:</label>
            <input list="list-pendidikan" id="pendidikan" name="pendidikan" placeholder="Pilih atau ketik pendidikan..." required>
            <datalist id="list-pendidikan">
                <option value="SD / Sederajat">
                <option value="SMP / Sederajat">
                <option value="SMA / SMK / Sederajat">
                <option value="Diploma (D1/D2/D3/D4)">
                <option value="Sarjana (S1)">
                <option value="Magister (S2)">
                <option value="Doktor (S3)">
            </datalist>
        </fieldset>

        <fieldset>
            <legend>Data Bank</legend>
            <label for="bank">Nama Bank:</label>
            <input list="list-bank" id="bank" name="bank" placeholder="Pilih atau ketik nama bank..." required>
            <datalist id="list-bank">
                <option value="Bank Mandiri">
                <option value="Bank BCA">
                <option value="Bank BNI">
                <option value="Bank BRI">
                <option value="Bank Syariah Indonesia (BSI)">
                <option value="Bank CIMB Niaga">
                <option value="Bank Danamon">
                <option value="Bank Permata">
            </datalist>

            <label for="rekening">Nomor Rekening:</label>
            <input type="number" id="rekening" name="rekening" required>
        </fieldset>

        <fieldset>
            <legend>Data Transaksi Keuangan</legend>
            <label for="tgl_transaksi">Tanggal Transaksi:</label>
            <input type="date" id="tgl_transaksi" name="tgl_transaksi" required>

            <label for="uraian">Uraian Transaksi:</label>
            <input type="text" id="uraian" name="uraian" placeholder="Contoh: Pembayaran listrik" required>

            <label>Jenis Transaksi:</label>
            <div class="radio-group">
                <label><input type="radio" name="jenis_transaksi" value="Transfer" required> Transfer</label>
                <label><input type="radio" name="jenis_transaksi" value="Tunai"> Tunai</label>
                <label><input type="radio" name="jenis_transaksi" value="QRIS"> QRIS</label>
            </div>

            <label for="debet">Nominal Debet (Rp):</label>
            <input type="number" id="debet" name="debet" placeholder="Isi 0 jika tidak ada">

            <label for="kredit">Nominal Kredit (Rp):</label>
            <input type="number" id="kredit" name="kredit" placeholder="Isi 0 jika tidak ada">
        </fieldset>

        <button type="submit" id="btn-submit">Kirim Data</button>
        <p id="pesan">Data berhasil dikirim ke Google Sheets!</p>
    </form>
</div>

<script>
    // GANTI URL DI BAWAH DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyVl0GfZZ3bGycGy0pChzSLu3fPm6sES6wg1HokgZm1WAKqIbeSWdQPteVuWx4x10PWIQ/exec';
    const form = document.forms['google-sheet'];
    const btnSubmit = document.getElementById('btn-submit');
    const pesan = document.getElementById('pesan');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btnSubmit.disabled = true;
        btnSubmit.innerText = 'Mengirim...';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                pesan.style.display = 'block';
                btnSubmit.disabled = false;
                btnSubmit.innerText = 'Kirim Data';
                form.reset(); // Mengosongkan form setelah sukses
                setTimeout(() => { pesan.style.display = 'none'; }, 5000);
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("Terjadi kesalahan saat mengirim data.");
                btnSubmit.disabled = false;
                btnSubmit.innerText = 'Kirim Data';
            });
    });
</script>

</body>
</html>
