<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video - Tema Maroon</title>
    <style>
        /* CSS INTERNAL */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #800000;
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }

        nav {
            background-color: #4a0000;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            padding: 1rem 1.5rem;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.9rem;
        }

        nav a:hover {
            background-color: #a52a2a;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #800000;
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #800000;
            padding-bottom: 10px;
        }

        /* Container Video Responsif */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Rasio 16:9 */
            height: 0;
            overflow: hidden;
            margin-bottom: 2rem;
            border: 5px solid #800000;
            border-radius: 8px;
        }

        .video-wrapper iframe, 
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-description {
            background-color: #fff5f5;
            border-left: 5px solid #800000;
            padding: 15px;
            margin-bottom: 2rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #800000;
            color: white;
            margin-top: 3rem;
        }

        @media (max-width: 600px) {
            nav { flex-direction: column; text-align: center; }
            .container { margin: 1rem; padding: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>KOLEKSI VIDEO</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri.html">Galeri</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="container">
        <h2>Video Depan Rumah</h2>
        
        <div class="video-wrapper">
            <iframe src="video hahhahaha.mp4" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>
        <div class="video-description">
            <p><strong>.</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Norhayani</p>
    </footer>

</body>
</html>
